<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiber Wallet</title>
    <script>
      (() => {
        const selectIsolationMode = () => {
          const params = new URLSearchParams(window.location.search);
          const forcedMode = params.get("isolation");
          if (forcedMode === "dip" || forcedMode === "coop") {
            return forcedMode;
          }

          const ua = navigator.userAgent;
          const isFirefox = /Firefox\/\d+/i.test(ua);
          const isChromiumFamily =
            /Chrome\/\d+/i.test(ua) || /Chromium\/\d+/i.test(ua) || /Edg\/\d+/i.test(ua);

          return !isFirefox && isChromiumFamily ? "dip" : "coop";
        };

        const mode = selectIsolationMode();
        const target = new URL(mode === "dip" ? "/dip.html" : "/coop.html", window.location.origin);
        if (window.location.search) {
          target.search = window.location.search;
        }
        if (window.location.hash) {
          target.hash = window.location.hash;
        }
        window.location.replace(target.toString());
      })();
    </script>
  </head>
  <body>
    <div id="app">Redirecting…</div>
  </body>
</html>
