<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiber Host (DIP)</title>
    <!--
      Document-Isolation-Policy (DIP) 版本
      
      此页面使用 DIP 头部启用跨源隔离，优势：
      1. 可以被同源的 iframe 加载，不需要弹窗
      2. 保持与父页面的引用关系
      3. 启用跨源隔离环境（crossOriginIsolated）
      
      DIP 值说明：
      - isolate-and-credentialless: 隔离环境，跨源请求不携带 credentials
      - isolate-and-require-corp: 隔离环境，跨源资源需要 CORP 头部
    -->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/fiber-host.ts"></script>
  </body>
</html>
