    <title>Fiber Host (DIP)</title>
    <!--
      Document-Isolation-Policy (DIP) Version
      
      This page uses DIP headers to enable cross-origin isolation, advantages:
      1. Can be loaded by same-origin iframe, no popup needed
      2. Maintains reference relationship with parent page
      3. Enables cross-origin isolation environment (crossOriginIsolated)
      
      DIP value description:
      - isolate-and-credentialless: Isolated environment, cross-origin requests don't carry credentials
      - isolate-and-require-corp: Isolated environment, cross-origin resources need CORP headers
    -->
  </head>
